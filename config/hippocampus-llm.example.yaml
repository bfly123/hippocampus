version: 1
settings:
  max_concurrent: 4
providers:
  main:
    provider_type: glm
    api_style: openai_responses
    base_url: https://your-backend.example
    api_key: your-api-key
    headers: {}
    model_map:
      openai/gpt-5.4: gpt-5.4
      openai/gpt-5.3-codex: gpt-5.3-codex
tiers:
  strong:
    candidates:
      - provider: main
        model: gpt-5.4
        reasoning_effort: high
  small:
    candidates:
      - provider: main
        model: gpt-5.4
        reasoning_effort: low
tasks:
  phase_1:
    tier: small
  phase_2a:
    tier: strong
  phase_2b:
    tier: small
  phase_3a:
    tier: small
  phase_3b:
    tier: strong
  architect:
    tier: strong
